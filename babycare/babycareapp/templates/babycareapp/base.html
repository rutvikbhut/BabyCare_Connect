{% extends "babycareapp/nav.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">BabyCare Connect</a>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <a class="nav-link position-relative" href="{% url 'inbox' %}">
                    Messages
                    {% if unread_count > 0 %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            {{ unread_count }}
                            <span class="visually-hidden">unread messages</span>
                        </span>
                    {% endif %}
                </a>
                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </div>
</nav>
</body>
<script>
    // 1. Request Permission from the User
    if ("Notification" in window) {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    // 2. Function to show the actual popup
    function showBrowserNotification(senderName, messageContent) {
        if (Notification.permission === "granted") {
            const notification = new Notification(`New message from ${senderName}`, {
                body: messageContent,
                icon: '/static/images/logo.png' // Ensure this path is correct
            });

            notification.onclick = function() {
                window.focus();
                window.location.href = "/chat/inbox/"; // Adjust to your inbox URL
            };
        }
    }

    // 3. Poll the server every 30 seconds for new messages
    setInterval(function() {
        if (document.visibilityState === 'hidden' || true) { // Optional: only notify if tab is hidden
            fetch('/api/check-unread/')
                .then(response => response.json())
                .then(data => {
                    if (data.new_message) {
                        showBrowserNotification(data.sender, data.text);
                    }
                })
                .catch(err => console.log("Polling error:", err));
        }
    }, 30000); 
</script>
</html>
{% endblock content %}
