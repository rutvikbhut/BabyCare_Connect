{% extends "babycareapp/nav.html" %}
{% block content %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         


    </style>
</head>
<body>
  
<form action="" method="post">  
     {% csrf_token %}
      {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p style="color:green;">{{ success }}</p>
    {% endif %}  
<section class="vh-100" >
  <div class="container h-100 ">
<div class="row d-flex justify-content-center align-items-center h-100">
<div class="col-lg-12 col-xl-11">
     <div class="text-black" style="border-radius: 25px;">
        <div class="card-body p-md-5">
            <div class="row justify-content-center">
            <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
    
                <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Reset Password</p>
    <div data-mdb-input-init class="form-outline mb-4 input-group">
            <span class="input-group-text"><i class="fas fa-envelope fa-lg me-3 fa-fw"></i></span>
            <input type="email" id="form3Example3" class="form-control"
              placeholder="Enter registered email" name="email"  />
      </div>

       <div data-mdb-input-init class="form-outline mb-4 input-group">
           
            <span class="input-group-text"><i class="fas fa-lock fa-lg me-3 fa-fw"></i></span>
            <input type="password" id="form3Example3" class="form-control"
              placeholder="New password" name="new_password"  />
      </div>
       <div data-mdb-input-init class="form-outline mb-4 input-group">
           
            <span class="input-group-text"><i class="fas fa-key fa-lg me-3 fa-fw"></i></span>
            <input type="password" id="form3Example3" class="form-control"
              placeholder="Confirm password" name="confirm_password"  />
      </div>
<div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                    <button  type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-lg">Reset</button>
                  </div>
</div>
</div>
</div>
</div>
</div>
</section>
</form>
</body>
</html>
{% endblock content %}
